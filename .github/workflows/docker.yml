name: Docker CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/grape-app .

      - name: Run Test Container
        run: |
          docker run -d -p 3000:3000 --name test-app ${{ secrets.DOCKER_USERNAME }}/grape-app
          sleep 10
          docker ps

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/grape-app